server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Assets com hash no nome (gerados pelo Vite) podem ser cacheados
    # agressivamente pelo browser - o proprio nome muda quando o conteudo muda.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html nunca deve ser cacheado, senao o browser fica preso numa
    # versao antiga do bundle apos um deploy novo.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: qualquer rota que nao seja um arquivo estatico cai no index.html
    # (React Router cuida do roteamento no cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
