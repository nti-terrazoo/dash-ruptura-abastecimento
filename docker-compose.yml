services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ruptura-backend
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8005:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://192.168.1.176:14445
    container_name: ruptura-frontend
    ports:
      - "127.0.0.1:5173:80"
    restart: unless-stopped
    depends_on:
      - backend
